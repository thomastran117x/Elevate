<div [class]="wrapperClass">
  @if (label) {
    <label class="text-xs font-semibold text-muted">
      {{ label }}
    </label>
  }

  <div [class]="fieldWrapClass">
    @if (prefix) {
      <span class="text-subtle text-sm">{{ prefix }}</span>
    }

    <input
      [attr.type]="type"
      [attr.placeholder]="placeholder"
      [attr.autocomplete]="autocomplete"
      [attr.inputmode]="inputmode"
      [disabled]="disabled"
      [class]="inputClass"
    />

    @if (suffix) {
      <span class="text-subtle text-sm">{{ suffix }}</span>
    }
  </div>

  @if (error) {
    <p class="text-xs text-danger">{{ error }}</p>
  }
  @if (!error && hint) {
    <p class="text-xs text-subtle">{{ hint }}</p>
  }
</div>
