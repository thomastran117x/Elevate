<div class="flex items-start gap-3" [class]="className">
  <span
    class="mt-0.5 h-6 w-6 rounded-xl border border-line bg-glass flex items-center justify-center"
    aria-hidden="true"
  >
    <span class="text-xs">✓</span>
  </span>
  <div class="min-w-0">
    @if (title) {
      <div class="text-sm font-semibold text-content">{{ title }}</div>
    }
    <div class="text-sm text-subtle leading-relaxed">
      <ng-content></ng-content>
    </div>
  </div>
</div>
