<div
  class="rounded-3xl border border-line bg-glass backdrop-blur p-8 text-center"
  [class]="className"
>
  <div class="mx-auto w-fit">
    <icon-shell>
      <span class="text-lg">{{ icon }}</span>
    </icon-shell>
  </div>

  <div class="mt-4 text-lg font-bold text-content">{{ title }}</div>
  <div class="mt-1 text-sm text-subtle max-w-md mx-auto">{{ subtitle }}</div>

  @if (primaryLabel) {
    <div class="mt-6 flex flex-col sm:flex-row gap-3 justify-center">
      <app-button variant="primary" [href]="primaryHref">{{ primaryLabel }} →</app-button>
      @if (secondaryLabel) {
        <app-button variant="ghost" [href]="secondaryHref">{{ secondaryLabel }}</app-button>
      }
    </div>
  }
</div>
