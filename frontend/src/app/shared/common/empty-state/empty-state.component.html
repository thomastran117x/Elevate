<div
  class="rounded-3xl border border-line bg-glass backdrop-blur p-8 text-center"
  [class]="className"
>
  <div class="mx-auto w-fit">
    <icon-shell>
      <span class="text-lg">{{ icon }}</span>
    </icon-shell>
  </div>

  <div class="mt-4 mx-auto max-w-md text-lg font-bold text-content">{{ title }}</div>
  <div class="mx-auto mt-1 max-w-md text-sm text-subtle">{{ subtitle }}</div>

  @if (primaryLabel) {
    <div class="mt-6 flex flex-col justify-center gap-3 sm:flex-row">
      <app-button variant="primary" [href]="primaryHref">{{ primaryLabel }} -></app-button>
      @if (secondaryLabel) {
        <app-button variant="ghost" [href]="secondaryHref">{{ secondaryLabel }}</app-button>
      }
    </div>
  }
</div>
