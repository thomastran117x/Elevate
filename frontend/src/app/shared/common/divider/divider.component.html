<div class="relative" [class]="className" aria-hidden="true">
  <div [class]="lineClass"></div>
  @if (label) {
    <div class="absolute inset-0 flex items-center justify-center">
      <span
        class="px-3 text-xs text-subtle bg-surface-sunken backdrop-blur rounded-full border border-line"
      >
        {{ label }}
      </span>
    </div>
  }
</div>
