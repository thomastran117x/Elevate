@if (!loading) {
  <app-navbar></app-navbar>
  <router-outlet></router-outlet>
  <app-footer></app-footer>
} @else {
  <div class="flex min-h-screen items-center justify-center bg-canvas px-4">
    <div class="surface-panel w-full max-w-md rounded-3xl p-10 text-center">
      <div
        class="mx-auto flex h-16 w-16 items-center justify-center rounded-full border border-accent/20 bg-accent/10 text-accent"
      >
        <div
          class="h-8 w-8 animate-spin rounded-full border-2 border-accent/25 border-t-accent"
        ></div>
      </div>
      <h3 class="mt-6 text-2xl font-bold text-content">Restoring your workspace</h3>
      <p class="mt-2 text-sm leading-6 text-muted">
        Checking your session and loading the latest event data.
      </p>
      <div
        class="mt-6 flex items-center justify-center gap-2 text-xs font-semibold uppercase tracking-[0.16em] text-subtle"
      >
        <span class="h-2 w-2 rounded-full bg-accent"></span>
        Secure session recovery
      </div>
    </div>
  </div>
  <ng-template />
}
