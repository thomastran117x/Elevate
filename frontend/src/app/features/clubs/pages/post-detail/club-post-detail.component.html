<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-3xl mx-auto">

    <!-- Back -->
    <button
      (click)="goBack()"
      class="flex items-center gap-1 text-sm text-blue-600 hover:text-blue-800 mb-6 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back to posts
    </button>

    <!-- Loading -->
    <div *ngIf="loading" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 animate-pulse">
      <div class="h-5 bg-gray-200 rounded w-1/2 mb-4"></div>
      <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
      <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
      <div class="h-3 bg-gray-200 rounded w-3/4"></div>
    </div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-sm">
      {{ error }}
    </div>

    <!-- Post -->
    <div *ngIf="post && !loading" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">

      <!-- Badges -->
      <div class="flex items-center gap-2 mb-3">
        <span *ngIf="post.isPinned" class="text-xs font-semibold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200">
          Pinned
        </span>
        <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full border border-blue-200">
          {{ post.postType }}
        </span>
      </div>

      <!-- Title -->
      <h1 class="text-xl font-bold text-gray-900 mb-4">{{ post.title }}</h1>

      <!-- Content -->
      <p class="text-sm text-gray-700 whitespace-pre-wrap mb-6">{{ post.content }}</p>

      <!-- Footer -->
      <div class="flex items-center justify-between pt-4 border-t border-gray-100 text-xs text-gray-500">
        <div class="flex items-center gap-4">
          <span>{{ authorDisplay(post) }}</span>
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            {{ post.likesCount }}
          </span>
          <span class="flex items-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            {{ post.viewCount }}
          </span>
        </div>
        <span>{{ formatDate(post.createdAt) }}</span>
      </div>
    </div>

    <!-- Comment thread -->
    <app-comment-thread
      *ngIf="post && !loading"
      [clubId]="clubId"
      [postId]="postId"
    ></app-comment-thread>

  </div>
</div>
