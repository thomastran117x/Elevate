<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">Club Posts</h1>
    </div>

    <!-- Search + Sort -->
    <div class="flex flex-col sm:flex-row gap-3 mb-6">
      <input
        type="text"
        [ngModel]="searchQuery"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Search posts..."
        class="flex-1 rounded-lg border border-gray-300 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <div class="flex gap-2">
        <button
          *ngFor="let sort of allSorts"
          (click)="setSort(sort)"
          [class.bg-blue-600]="selectedSort === sort"
          [class.text-white]="selectedSort === sort"
          [class.bg-white]="selectedSort !== sort"
          [class.text-gray-700]="selectedSort !== sort"
          class="px-4 py-2 rounded-lg border border-gray-300 text-sm font-medium transition-colors"
        >
          {{ sort }}
        </button>
      </div>
    </div>

    <!-- Loading skeleton -->
    <ng-container *ngIf="loading">
      <div
        *ngFor="let _ of [1, 2, 3]"
        class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-4 animate-pulse"
      >
        <div class="h-4 bg-gray-200 rounded w-3/4 mb-3"></div>
        <div class="h-3 bg-gray-200 rounded w-full mb-2"></div>
        <div class="h-3 bg-gray-200 rounded w-2/3"></div>
      </div>
    </ng-container>

    <!-- Error -->
    <div
      *ngIf="error && !loading"
      class="bg-red-50 border border-red-200 rounded-xl p-4 mb-4 text-red-700 text-sm"
    >
      {{ error }}
    </div>

    <!-- Empty state -->
    <div *ngIf="!loading && !error && posts.length === 0" class="text-center py-16 text-gray-500">
      <p class="text-lg font-medium">No posts yet</p>
      <p class="text-sm mt-1" *ngIf="searchQuery">Try a different search term.</p>
    </div>

    <!-- Post cards -->
    <div *ngIf="!loading">
      <div
        *ngFor="let post of posts"
        (click)="navigateToPost(post)"
        class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-4 cursor-pointer hover:shadow-md transition-shadow"
      >
        <!-- Pinned + Type badge -->
        <div class="flex items-center gap-2 mb-2">
          <span
            *ngIf="post.isPinned"
            class="text-xs font-semibold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200"
          >
            Pinned
          </span>
          <span
            class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full border border-blue-200"
          >
            {{ post.postType }}
          </span>
        </div>

        <!-- Title -->
        <h2 class="text-base font-semibold text-gray-900 mb-1 line-clamp-2">{{ post.title }}</h2>

        <!-- Content preview -->
        <p class="text-sm text-gray-600 line-clamp-3 mb-3">{{ post.content }}</p>

        <!-- Footer: author + stats + date -->
        <div class="flex items-center justify-between text-xs text-gray-500">
          <div class="flex items-center gap-3">
            <span>{{ authorDisplay(post) }}</span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                />
              </svg>
              {{ post.likesCount }}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
              {{ post.viewCount }}
            </span>
          </div>
          <span>{{ formatDate(post.createdAt) }}</span>
        </div>
      </div>
    </div>

    <!-- Load more -->
    <div *ngIf="!loading && currentPage < totalPages" class="text-center mt-4">
      <button
        (click)="loadMore()"
        [disabled]="loadingMore"
        class="px-6 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 transition-colors"
      >
        <span *ngIf="!loadingMore">Load more</span>
        <span *ngIf="loadingMore">Loading...</span>
      </button>
    </div>
  </div>
</div>
