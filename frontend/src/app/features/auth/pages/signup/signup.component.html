<div class="min-h-screen bg-surface text-content flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl border border-line bg-glass p-8 backdrop-blur">
    <h1 class="text-3xl font-bold">Create your account</h1>
    <p class="mt-2 text-sm text-muted">
      Choose your role, verify your email, and finish setup from the inbox link.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-xl border border-line bg-surface-sunken px-4 py-3 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-muted mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-xl border border-line bg-surface-sunken px-4 py-3 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-muted mb-2">Role</label>
        <div class="grid gap-2">
          @for (role of roleOptions; track role) {
            <label
              class="flex items-center gap-3 rounded-xl border border-line bg-surface-sunken px-4 py-3"
            >
              <input type="radio" formControlName="usertype" [value]="role.value" />
              <span>{{ role.label }}</span>
            </label>
          }
        </div>
      </div>

      @if (error) {
        <div class="text-sm text-danger">{{ error }}</div>
      }
      @if (success) {
        <div class="text-sm text-success">{{ success }}</div>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-xl bg-inverse px-4 py-3 font-semibold text-inverse-content disabled:opacity-60"
      >
        {{ loading ? 'Sending verification...' : 'Create account' }}
      </button>
    </form>

    <p class="mt-5 text-sm text-subtle">
      Already have an account?
      <a routerLink="/auth/login" class="text-content underline">Sign in</a>
    </p>
  </div>
</div>
