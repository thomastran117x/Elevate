<div class="min-h-screen bg-slate-950 text-white flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 backdrop-blur">
    <h1 class="text-3xl font-bold">Reset your password</h1>
    <p class="mt-2 text-sm text-white/70">
      Enter your email and we’ll send you a secure password reset link.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-white/80 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full rounded-xl border border-white/10 bg-slate-900/70 px-4 py-3 outline-none"
        />
      </div>

      @if (error) {
        <div class="text-sm text-red-300">{{ error }}</div>
      }
      @if (success) {
        <div class="text-sm text-emerald-300">{{ success }}</div>
      }

      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-xl bg-white px-4 py-3 font-semibold text-slate-950 disabled:opacity-60"
      >
        {{ loading ? 'Sending reset email...' : 'Send reset link' }}
      </button>
    </form>

    <p class="mt-5 text-sm text-white/65">
      Back to
      <a routerLink="/auth/login" class="text-white underline">sign in</a>
    </p>
  </div>
</div>
