<div class="relative min-h-screen flex items-center justify-center px-4 bg-surface">
  <!-- Background Glow -->
  <div class="absolute inset-0 pointer-events-none">
    <div
      class="absolute -top-40 -left-40 w-[500px] h-[500px] bg-accent/10 dark:bg-accent/20 rounded-full blur-3xl"
    ></div>
    <div
      class="absolute -bottom-40 -right-40 w-[500px] h-[500px] bg-accent/10 dark:bg-accent/20 rounded-full blur-3xl"
    ></div>
  </div>

  <!-- Card -->
  <div
    class="relative z-10 w-full max-w-md rounded-2xl border border-line bg-surface-raised/80 backdrop-blur-xl shadow-xl p-8 text-center"
  >
    <!-- Microsoft Badge -->
    <div class="flex justify-center mb-6">
      <div
        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-glass-strong text-xs font-medium text-muted"
      >
        <svg width="14" height="14" viewBox="0 0 23 23">
          <rect x="1" y="1" width="9" height="9" fill="#F25022" />
          <rect x="13" y="1" width="9" height="9" fill="#7FBA00" />
          <rect x="1" y="13" width="9" height="9" fill="#00A4EF" />
          <rect x="13" y="13" width="9" height="9" fill="#FFB900" />
        </svg>
        Microsoft Sign-In
      </div>
    </div>

    <!-- Loading -->
    @if (status() === 'loading') {
      <div class="space-y-6">
        <div
          class="mx-auto w-14 h-14 rounded-full border-4 border-accent/20 border-t-accent animate-spin"
        ></div>
        <p class="text-sm font-medium text-muted">
          {{ message() }}
        </p>
      </div>
    }

    <!-- Success -->
    @if (status() === 'success') {
      <div class="space-y-6">
        <div
          class="mx-auto w-16 h-16 rounded-full bg-success/10 text-success flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <p class="text-lg font-semibold text-content">
          {{ message() }}
        </p>
        <a
          routerLink="/dashboard"
          class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-accent hover:bg-accent-hover text-accent-contrast font-medium transition"
        >
          Continue to Dashboard
        </a>
      </div>
    }
    <!-- Device Verification -->
    @if (status() === 'device') {
      <div class="space-y-6">
        <div
          class="mx-auto w-16 h-16 rounded-full bg-warning/10 text-warning flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21.75 9v.906a2.25 2.25 0 01-1.068 1.916l-7.5 4.615a2.25 2.25 0 01-2.364 0l-7.5-4.615A2.25 2.25 0 012.25 9.906V9m19.5-3.75v-.75A2.25 2.25 0 0019.5 2.25h-15A2.25 2.25 0 002.25 4.5v.75m19.5 0l-8.69 5.347a2.25 2.25 0 01-2.36 0L2.25 5.25"
            />
          </svg>
        </div>
        <p class="text-lg font-semibold text-content">
          {{ message() }}
        </p>
        <div class="flex justify-center gap-3 pt-2">
          <a
            routerLink="/auth/login"
            class="px-5 py-3 rounded-xl bg-accent hover:bg-accent-hover text-accent-contrast font-medium transition"
          >
            Back to Login
          </a>
        </div>
      </div>
    }

    <!-- Error -->
    @if (status() === 'error') {
      <div class="space-y-6">
        <div
          class="mx-auto w-16 h-16 rounded-full bg-danger/10 text-danger flex items-center justify-center"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <p class="text-lg font-semibold text-content">
          {{ message() }}
        </p>
        <div class="flex justify-center gap-3 pt-2">
          <button
            (click)="retry()"
            class="px-5 py-3 rounded-xl bg-accent hover:bg-accent-hover text-accent-contrast font-medium transition"
          >
            Retry
          </button>
          <a
            routerLink="/auth"
            class="px-5 py-3 rounded-xl border border-line text-content hover:bg-glass-strong transition"
          >
            Back to Auth
          </a>
        </div>
      </div>
    }
  </div>
</div>
