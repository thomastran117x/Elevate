<div class="verify-shell">
  <div class="verify-card">
    <p class="verify-eyebrow">Email Verification</p>
    <h1>Confirm this email address</h1>
    <p class="verify-copy">{{ message() }}</p>

    @if (status() === 'loading') {
      <div class="verify-spinner" aria-hidden="true"></div>
    }

    @if (status() === 'ready') {
      <div class="verify-actions">
        <button type="button" class="verify-primary" (click)="confirm()" [disabled]="!hasToken">
          Verify Email
        </button>
        <a routerLink="/auth/login" class="verify-secondary">Back to login</a>
      </div>
    }

    @if (status() === 'success') {
      <div class="verify-actions">
        <a routerLink="/dashboard" class="verify-primary">Go to dashboard</a>
      </div>
    }

    @if (status() === 'error') {
      <div class="verify-actions">
        <button type="button" class="verify-primary" (click)="confirm()" [disabled]="!hasToken">
          Try Again
        </button>
        <a routerLink="/auth/login" class="verify-secondary">Back to login</a>
      </div>
    }
  </div>
</div>
