<div class="min-h-screen bg-surface text-content flex items-center justify-center p-6">
  <div class="w-full max-w-md rounded-3xl border border-line bg-glass p-8 backdrop-blur">
    <h1 class="text-3xl font-bold">Choose a new password</h1>
    <p class="mt-2 text-sm text-muted">
      Set a new password for your account and return to sign in.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-muted mb-1">New password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full rounded-xl border border-line bg-surface-sunken px-4 py-3 outline-none"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-muted mb-1">Confirm password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          class="w-full rounded-xl border border-line bg-surface-sunken px-4 py-3 outline-none"
        />
      </div>

      @if (error) {
        <div class="text-sm text-danger">{{ error }}</div>
      }
      @if (success) {
        <div class="text-sm text-success">{{ success }}</div>
      }

      <button
        type="submit"
        [disabled]="loading || !token"
        class="w-full rounded-xl bg-inverse px-4 py-3 font-semibold text-inverse-content disabled:opacity-60"
      >
        {{ loading ? 'Updating password...' : 'Update password' }}
      </button>
    </form>

    <p class="mt-5 text-sm text-subtle">
      Back to
      <a routerLink="/auth/login" class="text-content underline">sign in</a>
    </p>
  </div>
</div>
