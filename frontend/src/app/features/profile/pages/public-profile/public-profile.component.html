<div
  class="relative min-h-screen overflow-hidden bg-page text-content"
>
  <!-- Ambient blobs -->
  <div class="pointer-events-none absolute inset-0">
    <div
      class="absolute -left-40 -top-40 h-[520px] w-[520px] animate-pulse rounded-full bg-purple-600/20 blur-3xl"
    ></div>
    <div
      class="absolute -right-40 top-60 h-[420px] w-[420px] animate-pulse rounded-full bg-fuchsia-600/20 blur-3xl"
    ></div>
  </div>

  <div class="relative z-10 mx-auto max-w-2xl px-6 py-20">
    <!-- Loading -->
    <div
      *ngIf="loading"
      class="rounded-2xl border border-line bg-glass px-6 py-12 text-center text-sm text-faint"
    >
      Loading profile...
    </div>

    <!-- Error / not found -->
    <div
      *ngIf="!loading && error"
      class="rounded-3xl border border-line bg-glass px-6 py-12 text-center backdrop-blur-xl"
    >
      <h1 class="text-2xl font-bold">Profile not found</h1>
      <p class="mt-3 text-sm text-subtle">{{ error }}</p>
    </div>

    <!-- Profile -->
    <article
      *ngIf="!loading && profile as p"
      class="rounded-3xl border border-line bg-glass px-8 py-10 text-center backdrop-blur-xl"
    >
      <div
        class="mx-auto flex h-28 w-28 items-center justify-center rounded-full bg-purple-500/30 text-3xl font-bold text-purple-200"
      >
        <ng-container *ngIf="p.Avatar; else initialsAvatar">
          <img [src]="p.Avatar" [alt]="p.Username" class="h-28 w-28 rounded-full object-cover" />
        </ng-container>
        <ng-template #initialsAvatar>{{ userInitials }}</ng-template>
      </div>

      <h1 class="mt-6 text-3xl font-black tracking-tight">{{ p.Name || p.Username }}</h1>
      <p class="mt-1 text-sm text-subtle">&#64;{{ p.Username }}</p>

      <div class="mt-4 flex items-center justify-center">
        <span
          class="rounded-full bg-purple-500/20 px-4 py-1.5 text-xs font-semibold text-accent"
        >
          {{ usertypeLabel }}
        </span>
      </div>

      <p class="mt-6 text-sm text-faint">Member since {{ p.CreatedAtUtc | date: 'longDate' }}</p>
    </article>
  </div>
</div>
