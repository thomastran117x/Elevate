<div class="flex flex-col gap-6">
  <article class="rounded-3xl border border-white/10 bg-white/5 px-6 py-6 backdrop-blur-xl">
    <div class="mb-6 space-y-1">
      <p class="text-xs font-semibold uppercase tracking-[0.22em] text-purple-300">Security</p>
      <h2 class="text-2xl font-bold">Change password</h2>
      <p class="text-sm leading-6 text-white/60">
        After changing your password, you will be signed out of all sessions and redirected to sign
        in again.
      </p>
    </div>

    <!-- Error flash -->
    <div
      *ngIf="error"
      class="mb-5 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-5 py-4 text-sm text-rose-300"
    >
      {{ error }}
    </div>

    <form class="space-y-5" [formGroup]="passwordForm" (ngSubmit)="changePassword()">
      <!-- Current password -->
      <div class="space-y-2">
        <label class="text-sm font-semibold text-white/80" for="current-password"
          >Current password</label
        >
        <input
          id="current-password"
          type="password"
          formControlName="currentPassword"
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-base text-white placeholder-white/30 outline-none transition focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20"
        />
        <p
          *ngIf="
            passwordForm.controls.currentPassword.invalid &&
            passwordForm.controls.currentPassword.touched
          "
          class="text-sm text-rose-400"
        >
          Current password is required.
        </p>
      </div>

      <!-- New password -->
      <div class="space-y-2">
        <label class="text-sm font-semibold text-white/80" for="new-password">New password</label>
        <input
          id="new-password"
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          placeholder="••••••••"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-base text-white placeholder-white/30 outline-none transition focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20"
        />
        <p
          *ngIf="
            passwordForm.controls.newPassword.invalid && passwordForm.controls.newPassword.touched
          "
          class="text-sm text-rose-400"
        >
          New password must be at least 8 characters.
        </p>
      </div>

      <!-- Confirm password -->
      <div class="space-y-2">
        <label class="text-sm font-semibold text-white/80" for="confirm-password"
          >Confirm new password</label
        >
        <input
          id="confirm-password"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          placeholder="••••••••"
          class="w-full rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-base text-white placeholder-white/30 outline-none transition focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20"
        />
        <p *ngIf="passwordsMismatch" class="text-sm text-rose-400">Passwords do not match.</p>
      </div>

      <button
        type="submit"
        [disabled]="saving"
        class="inline-flex items-center justify-center rounded-2xl bg-purple-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-purple-500 disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ saving ? 'Changing password...' : 'Change password' }}
      </button>
    </form>
  </article>
</div>
