# ---------------------------------------------------------------------------
# Shared environment groups (YAML anchors).
# These are merged into each service's `environment:` via `<<: [*anchor]`.
# Every value carries a `${VAR:-default}` fallback so `docker compose up` works
# even without a .env file. Real values come from the root .env (env_file).
# ---------------------------------------------------------------------------
x-common-env: &common-env
  ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"

x-elasticsearch-env: &elasticsearch-env
  ELASTICSEARCH_URL: "${ELASTICSEARCH_URL:-http://elasticsearch:9200}"

# Shared by backend + sms-worker
x-sms-mfa-env: &sms-mfa-env
  AUTH_SMS_MFA_ENROLLMENT_ENABLED: "${AUTH_SMS_MFA_ENROLLMENT_ENABLED:-true}"
  AUTH_SMS_MFA_ENFORCEMENT_ENABLED: "${AUTH_SMS_MFA_ENFORCEMENT_ENABLED:-false}"
  AUTH_SMS_MFA_STEP_UP_SMS_ENABLED: "${AUTH_SMS_MFA_STEP_UP_SMS_ENABLED:-true}"

# Shared by backend + frontend (all 17 feature flags)
x-feature-flags-env: &feature-flags-env
  FEATURE_AUTH: "${FEATURE_AUTH:-true}"
  FEATURE_CLUBS: "${FEATURE_CLUBS:-true}"
  FEATURE_CLUBS_FOLLOW: "${FEATURE_CLUBS_FOLLOW:-true}"
  FEATURE_CLUBS_POSTS: "${FEATURE_CLUBS_POSTS:-true}"
  FEATURE_CLUBS_REVIEWS: "${FEATURE_CLUBS_REVIEWS:-true}"
  FEATURE_CLUBS_VERSIONING: "${FEATURE_CLUBS_VERSIONING:-true}"
  FEATURE_EVENTS: "${FEATURE_EVENTS:-true}"
  FEATURE_EVENTS_ANALYTICS: "${FEATURE_EVENTS_ANALYTICS:-true}"
  FEATURE_EVENTS_IMAGES: "${FEATURE_EVENTS_IMAGES:-true}"
  FEATURE_EVENTS_INVITATIONS: "${FEATURE_EVENTS_INVITATIONS:-true}"
  FEATURE_EVENTS_REGISTRATION: "${FEATURE_EVENTS_REGISTRATION:-true}"
  FEATURE_EVENTS_VERSIONING: "${FEATURE_EVENTS_VERSIONING:-true}"
  FEATURE_PAYMENT: "${FEATURE_PAYMENT:-true}"
  FEATURE_PROFILE: "${FEATURE_PROFILE:-true}"
  FEATURE_PROFILE_ADMIN: "${FEATURE_PROFILE_ADMIN:-true}"
  FEATURE_SEARCH: "${FEATURE_SEARCH:-true}"
  FEATURE_SEARCH_REINDEX: "${FEATURE_SEARCH_REINDEX:-true}"

services:
  frontend:
    container_name: event-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*feature-flags-env]
      NODE_ENV: "${NODE_ENV:-development}"
      # Browser-facing API base. Kept on a distinct interpolation name so it does
      # not collide with the root .env BACKEND_URL (used for local, non-docker runs).
      # The browser calls same-origin /api, which the SSR server proxies to the backend.
      BACKEND_URL: "${FRONTEND_BACKEND_URL:-http://localhost:3090/api}"
      API_PROXY_TARGET: "${FRONTEND_API_PROXY_TARGET:-http://backend:8090}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3090}"
      # Angular 21 SSR Host allowlist (SSRF protection). Hostnames only, no ports.
      NG_ALLOWED_HOSTS: "${NG_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      # Public OAuth / captcha ids baked into the browser bundle by generate-env.mjs.
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      MSAL_CLIENT_ID: "${MSAL_CLIENT_ID:-}"
      GOOGLE_SITE_KEY: "${GOOGLE_SITE_KEY:-}"
    ports:
      - "3090:3090"
    depends_on:
      - backend
    networks:
      - event-network

  backend:
    container_name: event-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env, *elasticsearch-env, *sms-mfa-env, *feature-flags-env]
      PORT: "${BACKEND_PORT:-8090}"
      DB_CONNECTION_STRING: "${DB_CONNECTION_STRING:-Server=mysql;Port=3306;Database=appdb;User=appuser;Password=apppass}"
      REDIS_URL: "${REDIS_URL:-redis:6379}"
      JWT_SECRET_ACCESS: "${JWT_SECRET_ACCESS:-amazing_secret_key_yup_yes_abcdef123}"
      JWT_SECRET_VERIFICATION: "${JWT_SECRET_VERIFICATION:-amazing_verification_secret_yup_yes_abcdef123}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Topics the backend publishes to (consumed by the workers).
      EMAIL_TOPIC: "${EMAIL_TOPIC:-eventxperience-email}"
      SMS_TOPIC: "${SMS_TOPIC:-eventxperience-sms}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3090}"
      # OAuth. The backend reads MS_CLIENT_ID; the single source var is MSAL_CLIENT_ID
      # (also consumed by the frontend), mapped here.
      MS_CLIENT_ID: "${MSAL_CLIENT_ID:-}"
      MS_TENANT_ID: "${MS_TENANT_ID:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      APPLE_CLIENT_ID: "${APPLE_CLIENT_ID:-}"
      # Captcha.
      CAPTCHA_PROVIDER: "${CAPTCHA_PROVIDER:-google}"
      GOOGLE_CAPTCHA_SECRET: "${GOOGLE_CAPTCHA_SECRET:-}"
      # Blob storage (Azure).
      AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-}"
      AZURE_STORAGE_CONTAINER_NAME: "${AZURE_STORAGE_CONTAINER_NAME:-}"
      # TOTP / MFA. Empty key => code uses the dev fallback (validated in prod).
      AUTH_TOTP_ENCRYPTION_KEY: "${AUTH_TOTP_ENCRYPTION_KEY:-}"
      AUTH_TOTP_MFA_ENROLLMENT_ENABLED: "${AUTH_TOTP_MFA_ENROLLMENT_ENABLED:-true}"
      AUTH_TOTP_MFA_STEP_UP_ENABLED: "${AUTH_TOTP_MFA_STEP_UP_ENABLED:-true}"
      # Payments (Stripe).
      STRIPE_API_KEY: "${STRIPE_API_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_SUCCESS_URL: "${STRIPE_SUCCESS_URL:-http://localhost:3090/payment/success}"
      STRIPE_CANCEL_URL: "${STRIPE_CANCEL_URL:-http://localhost:3090/payment/cancel}"
      # Seeders (dev/optional).
      RUN_SEEDERS: "${RUN_SEEDERS:-false}"
      AUTH_SEED_ACCOUNT_BYPASS: "${AUTH_SEED_ACCOUNT_BYPASS:-false}"
      AUTH_SEED_USERS_PASSWORD: "${AUTH_SEED_USERS_PASSWORD:-Password123!}"
      AUTH_SEED_ADMIN_PASSWORD: "${AUTH_SEED_ADMIN_PASSWORD:-AdminPassword123!}"
      AUTH_SEED_ADMIN_EMAIL: "${AUTH_SEED_ADMIN_EMAIL:-admin@seed.eventxperience.test}"
      AUTH_SEED_ADMIN_USERNAME: "${AUTH_SEED_ADMIN_USERNAME:-seedadmin}"
      AUTH_SEED_ADMIN_NAME: "${AUTH_SEED_ADMIN_NAME:-Seed Admin}"
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - event-network

  event-indexer:
    container_name: event-event-indexer
    build:
      context: ./backend
      dockerfile: src/worker/event-indexer/Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env, *elasticsearch-env]
      EVENT_INDEX_TOPIC: "${EVENT_INDEX_TOPIC:-event-index-events}"
      EVENT_INDEX_GROUP_ID: "${EVENT_INDEX_GROUP_ID:-event-indexer}"
      EVENT_INDEX_DLQ_TOPIC: "${EVENT_INDEX_DLQ_TOPIC:-event-index-events-dlq}"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka-connect-init:
        condition: service_completed_successfully
      kafka-connect:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - event-network

  club-indexer:
    container_name: event-club-indexer
    build:
      context: ./backend
      dockerfile: src/worker/club-indexer/Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env, *elasticsearch-env]
      CLUB_INDEX_TOPIC: "${CLUB_INDEX_TOPIC:-club-index-events}"
      CLUB_INDEX_GROUP_ID: "${CLUB_INDEX_GROUP_ID:-club-indexer}"
      CLUB_INDEX_DLQ_TOPIC: "${CLUB_INDEX_DLQ_TOPIC:-club-index-events-dlq}"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka-connect-init:
        condition: service_completed_successfully
      kafka-connect:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - event-network

  clubpost-indexer:
    container_name: event-clubpost-indexer
    build:
      context: ./backend
      dockerfile: src/worker/clubpost-indexer/Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env, *elasticsearch-env]
      CLUB_POST_INDEX_TOPIC: "${CLUB_POST_INDEX_TOPIC:-clubpost-index-events}"
      CLUB_POST_INDEX_GROUP_ID: "${CLUB_POST_INDEX_GROUP_ID:-clubpost-indexer}"
      CLUB_POST_INDEX_DLQ_TOPIC: "${CLUB_POST_INDEX_DLQ_TOPIC:-clubpost-index-events-dlq}"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      kafka-connect-init:
        condition: service_completed_successfully
      kafka-connect:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - event-network

  email-worker:
    container_name: event-email-worker
    build:
      context: ./backend
      dockerfile: src/worker/email-worker/Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env]
      EMAIL_TOPIC: "${EMAIL_TOPIC:-eventxperience-email}"
      EMAIL_GROUP_ID: "${EMAIL_GROUP_ID:-email-worker}"
      EMAIL_DLQ_TOPIC: "${EMAIL_DLQ_TOPIC:-eventxperience-email-dlq}"
      EMAIL_STATUS_TOPIC: "${EMAIL_STATUS_TOPIC:-eventxperience-email-status}"
      SMTP_SERVER: "${SMTP_SERVER:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      EMAIL_USER: "${EMAIL_USER:-}"
      EMAIL_PASSWORD: "${EMAIL_PASSWORD:-}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3090}"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - event-network

  sms-worker:
    container_name: event-sms-worker
    build:
      context: ./backend
      dockerfile: src/worker/sms-worker/Dockerfile
    env_file:
      - path: ./.env
        required: false
    environment:
      <<: [*common-env, *kafka-env, *sms-mfa-env]
      SMS_TOPIC: "${SMS_TOPIC:-eventxperience-sms}"
      SMS_GROUP_ID: "${SMS_GROUP_ID:-sms-worker}"
      SMS_DLQ_TOPIC: "${SMS_DLQ_TOPIC:-eventxperience-sms-dlq}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
      TWILIO_MESSAGING_SERVICE_SID: "${TWILIO_MESSAGING_SERVICE_SID:-}"
      TWILIO_FROM_PHONE_NUMBER: "${TWILIO_FROM_PHONE_NUMBER:-}"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - event-network

  mysql:
    container_name: event-mysql
    image: mysql:8.4
    restart: always
    command:
      - "--server-id=223344"
      - "--log-bin=mysql-bin"
      - "--binlog_format=ROW"
      - "--binlog_row_image=FULL"
      - "--binlog_expire_logs_seconds=86400"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-appdb}"
      MYSQL_USER: "${MYSQL_USER:-appuser}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-apppass}"
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - event-network

  redis:
    container_name: event-redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - event-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
    container_name: event-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - event-network

  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: event-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9093:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - event-network

  kafka-init:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: event-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic event-index-events --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic event-index-events-dlq --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic club-index-events --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic club-index-events-dlq --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic clubpost-index-events --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic clubpost-index-events-dlq --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic eventxperience-email --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic eventxperience-email-dlq --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic eventxperience-email-status --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic eventxperience-sms --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic eventxperience-sms-dlq --partitions 1 --replication-factor 1
        echo "All Kafka topics created."
    networks:
      - event-network

  kafka-connect:
    image: quay.io/debezium/connect:3.0.7.Final
    container_name: event-kafka-connect
    restart: unless-stopped
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      - kafka
      - mysql
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - event-network

  kafka-connect-init:
    image: curlimages/curl:8.8.0
    container_name: event-kafka-connect-init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./docker/kafka-connect:/scripts:ro
    entrypoint:
      - sh
      - -c
      - tr -d '\r' < /scripts/register-event-outbox-connector.sh | sh
    networks:
      - event-network

networks:
  event-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  elasticsearch_data:
