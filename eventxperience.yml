apiVersion: v1
kind: Namespace
metadata:
  name: eventxperience

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root
            - name: MYSQL_DATABASE
              value: appdb
            - name: MYSQL_USER
              value: appuser
            - name: MYSQL_PASSWORD
              value: apppass
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: eventxperience
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: eventxperience
spec:
  selector:
    app: mysql
  ports:
    - port: 3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: eventxperience
spec:
  selector:
    app: redis
  ports:
    - port: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.16.1
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.security.http.ssl.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: eventxperience
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.8
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_KRAFT_CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: eventxperience
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
    - name: controller
      port: 9093

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: myapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:8090"
            - name: DB_CONNECTION_STRING
              value: "Server=mysql;Port=3306;Database=appdb;User=appuser;Password=apppass"
            - name: REDIS_CONNECTION
              value: "redis:6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: JWT_SECRET_KEY
              value: "amazing_secret_key_yup_yes_abcdef123"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eventxperience
spec:
  selector:
    app: backend
  ports:
    - port: 8090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: myapp-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ELASTICSEARCH_URL
              value: "http://elasticsearch:9200"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: EVENT_INDEX_TOPIC
              value: "event-index-events"
            - name: EVENT_INDEX_GROUP_ID
              value: "event-indexer"
            - name: EVENT_INDEX_DLQ_TOPIC
              value: "event-index-events-dlq"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eventxperience
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: myapp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3090
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eventxperience
spec:
  selector:
    app: frontend
  ports:
    - port: 3090
  type: NodePort
