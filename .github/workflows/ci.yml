name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-format:
    name: Backend Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend solution
        run: dotnet restore backend.sln

      - name: Verify backend formatting
        run: dotnet format backend.sln --verify-no-changes --no-restore

  frontend-format:
    name: Frontend Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend formatting
        run: npm run format:check

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run unit tests with coverage gate
        run: dotnet run --project tools/Event.DevTasks/Event.DevTasks.csproj -- backend-unit-coverage

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Verify Docker availability
        run: docker version

      - name: Run integration tests
        run: dotnet run --project tools/Event.DevTasks/Event.DevTasks.csproj -- backend-integration-tests

      - name: Run integration endpoint coverage audit
        run: dotnet run --project tools/Event.DevTasks/Event.DevTasks.csproj -- backend-integration-endpoint-coverage --fail-on-missing
